# MSF database.yml bind-mounted into the msf container at
# /root/.msf4/database.yml so MSF auto-connects on framework boot.
# Targets the compose-network's `db` service (postgres:13-alpine).
production:
  adapter: postgresql
  database: msf
  username: msf
  password: msfpass
  host: db
  port: 5432
  pool: 200
  timeout: 5
