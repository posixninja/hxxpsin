# Metasploit + Postgres + DVWA target for hxxpsin msf_ingest integration tests.
#
# Three containers on a shared bridge network:
#   db      — postgres 13, the version MSF officially supports
#   msf     — metasploit-framework, runs msfrpcd against `db`
#   target  — vulnerable web app (DVWA), what MSF will scan
#
# Ports exposed on the host (matching hxxpsin's default MSFProfile):
#   55553/tcp  msfrpcd  (RPC backend)
#   5432/tcp   postgres (DB backend — direct PG fallback)
#   8080/tcp   DVWA     (drive-from-hxxpsin target)
#
# Bring up:    ./up.sh         (runs `docker compose up -d` then seed.sh)
# Seed only:   ./seed.sh       (msfconsole -r seed.rc against the running stack)
# Tear down:   ./down.sh       (compose down -v — drops the db volume)
#
# Credentials are static and intentionally weak — this stack is for
# loopback-only test use. Do not expose any of these ports publicly.

services:
  db:
    image: postgres:13-alpine
    container_name: hxxpsin-msf-db
    environment:
      POSTGRES_USER: msf
      POSTGRES_PASSWORD: msfpass
      POSTGRES_DB: msf
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msf -d msf"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks:
      - msfnet

  msf:
    image: metasploitframework/metasploit-framework:latest
    container_name: hxxpsin-msf
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:55553:55553"
    # The image's WORKDIR is /usr/src/metasploit-framework and ships no
    # global PATH entry — invoke MSF binaries with the leading ./
    #
    # msfdb init bootstraps a *local* postgres which we don't have in this
    # container. Skip it and bind-mount database.yml so MSF auto-connects
    # to the compose-network's external `db` service on framework boot.
    environment:
      MSF_DATABASE_CONFIG: /root/.msf4/database.yml
    volumes:
      - ./database.yml:/root/.msf4/database.yml:ro
    command:
      - /bin/bash
      - -lc
      # NOTE: In this msfrpcd build `-S` *disables* SSL (opposite of older
      # docs). Omit it to keep SSL on, which matches hxxpsin's MSFProfile
      # default (rpc_ssl=True). Client verifies with verify=False against
      # the auto-generated self-signed cert.
      - exec ./msfrpcd -U msf -P msfrpcpass -a 0.0.0.0 -p 55553 -f
    networks:
      - msfnet

  target:
    image: vulnerables/web-dvwa:latest
    container_name: hxxpsin-msf-target
    ports:
      - "127.0.0.1:8080:80"
    networks:
      msfnet:
        # Pinned so seed.rc + test assertions can hardcode the address.
        ipv4_address: 172.28.0.10

networks:
  msfnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
